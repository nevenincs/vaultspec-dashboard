# The channel publication gate (a2a-product-provisioning W04.P10.S85 + S159).
#
# A reusable, FAIL-CLOSED gate that a package-manager channel's publication path
# calls before it publishes any metadata. It answers one question: "has this
# channel earned publication?" and refuses by default.
#
# WHY A SEPARATE WORKFLOW (not a release.yml edit): the plan nominally sites
# S85/S159 in release.yml, but release.yml is cargo-dist-autogenerated (Dist
# rewrites it on `dist init`; hand edits are fragile). The gate therefore lives
# in its own Dist-safe reusable workflow and is `uses:`-called from the channel
# publication paths (scoop-bump.yml today; the WinGet publish path when it
# exists). This preserves the S85/S159 intent — publication is gated — without
# hand-editing the generated file.
#
# THE PROOF-OF-RECORD is packaging/a2a-support-matrix.json (W01.P01.S146). A
# channel is publishable ONLY when its matrix `support_status` is `supported`.
# The phase-zero clean-machine install/upgrade/downgrade/repair/uninstall proof
# `.github/workflows/a2a-channel-feasibility.yml` (W01.P01.S147 scoop / S149
# winget) is what WRITES that status (W01.P01.S148): a genuine clean-machine pass
# flips a channel `feasibility_gated`→`supported`; a real reversibility failure
# flips it `→unsupported` with an ADR-revisit reason; inputs-pending leaves it
# `feasibility_gated`. Until the proof passes on real runners the matrix stays
# `feasibility_gated` and this gate refuses to publish. That is the ADR D2 rule:
# a channel without a proven reversible adapter is NOT a supported update channel,
# and a failed phase-zero proof reopens the ADR rather than certifying on metadata.
#
# The gate asserts the proof workflow's PRESENCE as a second fail-closed
# condition, so the matrix can never read `supported` while the proof machinery
# is missing from the tree. Both conditions must hold to publish. Today both
# channels fail closed (matrix = feasibility_gated; the proof runs release-time
# and no real pass has been recorded).

name: channel-publish-gate

on:
  workflow_call:
    inputs:
      channel:
        description: 'The package-manager channel to gate (scoop | winget).'
        required: true
        type: string

jobs:
  gate:
    name: Gate ${{ inputs.channel }} publication
    runs-on: Linux
    steps:
      - uses: actions/checkout@v6
      - name: Prove the channel earned publication
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          MATRIX=packaging/a2a-support-matrix.json
          # The Windows package-manager channels (scoop, winget) are the only
          # feasibility-gated ones; reject anything else outright.
          case "$CHANNEL" in
            scoop|winget) ;;
            *) echo "channel-publish-gate: '$CHANNEL' is not a gated package-manager channel"; exit 1 ;;
          esac
          test -f "$MATRIX" || { echo "channel-publish-gate: support matrix $MATRIX is absent — fail closed"; exit 1; }

          # Condition 1 — the phase-zero proof machinery must EXIST. Its absence
          # is the flagged W01 gap (S147/S149); the matrix must not be flippable
          # to `supported` without it.
          PROOF_WF=.github/workflows/a2a-channel-feasibility.yml
          if [ ! -f "$PROOF_WF" ]; then
            echo "channel-publish-gate: phase-zero proof workflow $PROOF_WF is absent (W01.P01.S147/S149 gap) — fail closed"
            PROOF_PRESENT=0
          else
            PROOF_PRESENT=1
          fi

          # Condition 2 — the matrix must record this channel as `supported` on
          # Windows. `feasibility_gated` means the phase-zero proof has not yet
          # passed; `unsupported` speaks for itself. Either refuses publication.
          STATUS=$(jq -r --arg c "$CHANNEL" \
            '.targets["x86_64-pc-windows-msvc"][$c].support_status // "absent"' "$MATRIX")
          echo "channel-publish-gate: $CHANNEL support_status = $STATUS; proof workflow present = $PROOF_PRESENT"
          if [ "$STATUS" != "supported" ]; then
            REASON=$(jq -r --arg c "$CHANNEL" \
              '.targets["x86_64-pc-windows-msvc"][$c].unsupported_reason // "phase-zero reversibility proof has not passed (matrix is feasibility_gated)"' "$MATRIX")
            echo "channel-publish-gate: refusing to publish $CHANNEL — status '$STATUS': $REASON"
            exit 1
          fi
          if [ "$PROOF_PRESENT" != "1" ]; then
            echo "channel-publish-gate: matrix marks $CHANNEL supported but the phase-zero proof workflow is absent — refusing (fail closed)"
            exit 1
          fi
          echo "channel-publish-gate: $CHANNEL cleared for publication"
      - name: Reclaim runner disk (always)
        if: always()
        shell: bash
        run: |
          set +e
          df -h . 2>/dev/null | tail -1
          rm -rf "${RUNNER_TEMP:-/tmp}"/vaultspec-* 2>/dev/null || true
          df -h . 2>/dev/null | tail -1
