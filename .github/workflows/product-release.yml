# The product-release workflow (a2a-product-provisioning W04.P08.S66-S72 + S166,
# W04.P09.S77): compose, verify, archive, and publish the COMPLETE product tree
# for each of the five release targets.
#
# This is a SEPARATE workflow, NOT an edit of the cargo-dist-autogenerated
# release.yml (Dist regenerates that file on `dist init`; hand edits are fragile).
# Dist is retained only for target planning, checksums, and GitHub release hosting
# (dist-workspace.toml S73); this workflow produces the offline-complete product
# artifacts Dist's binary-only installers do not.
#
# Per target it builds the dashboard + copied updater, FETCHES the pinned A2A
# capsule, and runs `product-build` (which verifies the capsule manifest against
# the committed component lock — the capsule's asset digests must match the lock's
# pinned python/node/acp, fail-closed — then composes + self-verifies the tree
# through the S06 authority). The tree is archived as
# `vaultspec-<version>-<target>.{tar.gz,zip}` + a sibling `.sha256`.
#
# VERIFICATION REALITY: authored here; the real proof is a release-CI run on a
# clean runner (the self-verify job below), not a local green.
#
# CROSS-REPO TBD: the exact A2A capsule fetch source — where vaultspec-a2a
# publishes the pinned capsule (at lock commit 7df84b1de4455ed79895136ab085c821ce988c9a)
# as a fetchable release artifact, and its URL/naming per target — is a cross-repo
# coordination point (the #46/#50 class ask), parameterized below as
# A2A_CAPSULE_BASE_URL. The capsule's TRUST does not depend on where it is hosted:
# product-build fails closed if the fetched capsule's manifest disagrees with the
# committed lock.

name: Product Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without the leading v)"
        required: true

permissions:
  contents: write

env:
  # CROSS-REPO TBD (see header): base URL the pinned A2A capsule is fetched from,
  # per target as `<base>/<target>/capsule.zip` + `.../component-manifest.json` +
  # `.../tree.json`. Wired when the vaultspec-a2a publish contract is coordinated.
  A2A_CAPSULE_BASE_URL: ""

jobs:
  build-product-tree:
    name: Compose ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-pc-windows-msvc, os: windows-latest, ext: zip }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest, ext: tar.gz }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, ext: tar.gz }
          - { target: x86_64-apple-darwin, os: macos-latest, ext: tar.gz }
          - { target: aarch64-apple-darwin, os: macos-latest, ext: tar.gz }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Read pinned toolchain
        id: toolchain
        shell: bash
        run: echo "channel=$(grep -m1 '^channel' engine/rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build the dashboard, updater, and product builder
        shell: bash
        working-directory: engine
        run: |
          set -euo pipefail
          cargo build --release --target ${{ matrix.target }} \
            -p vaultspec-cli -p vaultspec-updater --bin vaultspec --bin vaultspec-updater
          cargo build --release -p vaultspec-product --bin product_build
      - name: Fetch + trust the pinned A2A capsule
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${A2A_CAPSULE_BASE_URL}" ]; then
            echo "::error::A2A_CAPSULE_BASE_URL is not set — the capsule fetch source is a cross-repo coordination point (see workflow header)." >&2
            exit 1
          fi
          mkdir -p capsule
          base="${A2A_CAPSULE_BASE_URL}/${{ matrix.target }}"
          curl -fsSL "${base}/capsule.zip" -o capsule/capsule.zip
          curl -fsSL "${base}/component-manifest.json" -o capsule/component-manifest.json
          curl -fsSL "${base}/tree.json" -o capsule/tree.json
          # Trust: product-build fails closed if the capsule manifest disagrees
          # with the committed component lock (asset digests must match the lock's
          # pinned python/node/acp). No separate archive-digest check is needed —
          # the manifest verify IS the anchor.
      - name: Compose + self-verify the product tree
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          target="${{ matrix.target }}"
          suffix=""; [ "${{ matrix.ext }}" = "zip" ] && suffix=".exe"
          gen_root="${PWD}/out/generations/0001"
          # Marshal the built binaries + fetched capsule + evidence into a
          # BuildSources spec; product_build composes, verifies the capsule against
          # the lock, emits release.json, and proves it covers the placed tree.
          # (SBOM + LICENSE are release inputs — an SBOM-generation step + the repo
          # LICENSE; sourced here as ${PWD}/packaging/sbom.cdx.json + ${PWD}/LICENSE.)
          python3 packaging/assemble-build-spec.py \
            --target "$target" --version "$version" \
            --commit "$(git rev-parse HEAD)" --cohort-id "release-${version}" \
            --generation-root "$gen_root" \
            --dashboard "${PWD}/engine/target/${target}/release/vaultspec${suffix}" \
            --updater "${PWD}/engine/target/${target}/release/vaultspec-updater${suffix}" \
            --capsule-archive "${PWD}/capsule/capsule.zip" \
            --capsule-manifest "${PWD}/capsule/component-manifest.json" \
            --tree-evidence "${PWD}/capsule/tree.json" \
            --lock "${PWD}/packaging/a2a-component.lock.json" \
            --sbom "${PWD}/packaging/sbom.cdx.json" \
            --license "vaultspec-a2a:MIT:${PWD}/LICENSE" \
            > build-spec.json
          ./engine/target/release/product_build build-spec.json
          echo "GEN_ROOT=${gen_root}" >> "$GITHUB_ENV"
      - name: Archive + checksum
        shell: bash
        run: |
          set -euo pipefail
          name="vaultspec-${{ steps.version.outputs.value }}-${{ matrix.target }}"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            (cd "$GEN_ROOT" && 7z a -tzip "${GITHUB_WORKSPACE}/${name}.zip" .) \
              || (cd "$GEN_ROOT" && zip -r "${GITHUB_WORKSPACE}/${name}.zip" .)
          else
            tar -czf "${GITHUB_WORKSPACE}/${name}.tar.gz" -C "$GEN_ROOT" .
          fi
          archive="${name}.${{ matrix.ext }}"
          ( sha256sum "$archive" || shasum -a 256 "$archive" ) | awk '{print $1}' > "${archive}.sha256"
          # The member manifest (release.json) drives the S166 cohort digest.
          cp "$GEN_ROOT/release.json" "release-${{ matrix.target }}.json"
      - name: Upload the release-set member
        uses: actions/upload-artifact@v4
        with:
          name: product-${{ matrix.target }}
          path: |
            vaultspec-*-${{ matrix.target }}.${{ matrix.ext }}
            vaultspec-*-${{ matrix.target }}.${{ matrix.ext }}.sha256
            release-${{ matrix.target }}.json

  self-verify:
    name: Clean-runner self-verify
    needs: build-product-tree
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: product-x86_64-pc-windows-msvc
          path: dl
      - name: Extract + verify-release on a clean runner
        shell: bash
        run: |
          set -euo pipefail
          # Extract the composed tree and run the shipped bounded authority against
          # it — the same verify a consumer's installer runs. A tree that composed
          # but does not verify fails the release.
          mkdir -p installed
          archive=$(ls dl/*.zip)
          7z x "$archive" -oinstalled -y
          ./installed/bin/vaultspec.exe verify-release ./installed

  cohort-digest:
    name: Cohort digest (S166)
    needs: build-product-tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read pinned toolchain
        id: toolchain
        shell: bash
        run: echo "channel=$(grep -m1 '^channel' engine/rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - uses: actions/download-artifact@v4
        with:
          path: members
      - name: Aggregate the five verified members + emit the cohort digest
        shell: bash
        run: |
          set -euo pipefail
          # S166: aggregate exactly one verified member per target, enforce the
          # common cohort id / A2A commit / component-lock / release-schema /
          # protocol / state identity across all five, and emit the receipt-bound
          # cohort digest — SHA-256 of the RFC 8785 JCS CohortDescriptor, produced
          # by the cohort-digest verb (serde_jcs, never hand-rolled in shell).
          cargo build --release -p vaultspec-product --bin cohort_digest --manifest-path engine/Cargo.toml
          ./engine/target/release/cohort_digest \
            --lock packaging/a2a-component.lock.json \
            --member aarch64-apple-darwin=members/product-aarch64-apple-darwin/release-aarch64-apple-darwin.json \
            --member x86_64-apple-darwin=members/product-x86_64-apple-darwin/release-x86_64-apple-darwin.json \
            --member aarch64-unknown-linux-gnu=members/product-aarch64-unknown-linux-gnu/release-aarch64-unknown-linux-gnu.json \
            --member x86_64-unknown-linux-gnu=members/product-x86_64-unknown-linux-gnu/release-x86_64-unknown-linux-gnu.json \
            --member x86_64-pc-windows-msvc=members/product-x86_64-pc-windows-msvc/release-x86_64-pc-windows-msvc.json \
            --out cohort-descriptor.json
      - uses: actions/upload-artifact@v4
        with:
          name: cohort-descriptor
          path: cohort-descriptor.json
