# Quality gates — the polyglot verification pipeline that mirrors `just dev lint`
# and `just dev audit`. Rust build/clippy/test live in engine-ci.yml; this
# workflow covers Python, the frontend SPA, repo-wide spell check, and the
# cross-language supply-chain audits. Each job is independent so one failure
# does not mask the others.
name: quality-gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spellcheck:
    name: Spell check (typos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  frontend:
    name: Frontend (eslint · prettier · tsc · vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - name: ESLint
        run: npm --prefix frontend run lint
      - name: Prettier check
        run: npm --prefix frontend run format:check
      - name: Type check (tsc)
        run: npm --prefix frontend run typecheck
      # The frontend suite is online-live by design (no in-memory doubles): its
      # vitest global setup spawns a REAL `vaultspec serve` and runs
      # `vaultspec-core install` against a scratch vault. Provision both — the
      # built engine binary and vaultspec-core on PATH — before vitest, or the
      # whole suite errors at global setup.
      # Pin to the repo toolchain (the action's RUSTUP_TOOLCHAIN export
      # overrides engine/rust-toolchain.toml, so pass the pin explicitly).
      - name: Read pinned toolchain
        id: toolchain
        shell: bash
        run: echo "channel=$(grep -m1 '^channel' engine/rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Build engine binary (live-engine test backend)
        run: cargo build --bin vaultspec
        working-directory: engine
      - uses: astral-sh/setup-uv@v6
      - name: Install vaultspec-core (live-engine declared-tier dependency)
        shell: bash
        run: |
          uv tool install vaultspec-core
          echo "$(uv tool dir --bin)" >> "$GITHUB_PATH"
      - name: Unit tests (vitest)
        run: npm --prefix frontend run test
      - name: Unused code (knip — advisory)
        run: npx --yes knip@5 --directory frontend
        continue-on-error: true

  engine-conformance:
    # Consumer-typed conformance (engine-hardening P01.S02, ADR D1): boot a
    # live vaultspec serve binary against a two-commit fixture and drive
    # EngineClient against it so wire-vs-TypeScript-type drift fails CI.
    # This closes the seam the Rust conformance.rs cannot reach (c812371).
    name: Engine TS conformance (live serve · EngineClient)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin to the repo toolchain (see the frontend job's note).
      - name: Read pinned toolchain
        id: toolchain
        shell: bash
        run: echo "channel=$(grep -m1 '^channel' engine/rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Build engine binary
        run: cargo build --bin vaultspec
        working-directory: engine
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - name: Create fixture and start serve
        shell: bash
        run: |
          set -euo pipefail
          FIXTURE=$(mktemp -d)
          cd "$FIXTURE"
          git init -b main .
          git config user.email "ci@test"
          git config user.name "CI"
          git config core.autocrlf false
          mkdir -p .vault/adr
          printf '%s\n' '---' 'tags:' "  - '#adr'" "  - '#engine-conformance'" \
            "date: '2026-06-13'" '---' '' '# conformance adr' '' 'CI fixture.' \
            > .vault/adr/2026-06-13-conformance-adr.md
          # Commit at fixed PAST dates relative to now: the conformance test's
          # graph/diff window is `corpusTs(now) - 14d .. now`, so the root commit
          # must predate it (else the engine 400s "timestamp predates the root
          # commit"). T1 at 30d ago anchors the root behind the window; T2 at 7d
          # ago lands inside it so the diff carries a real delta.
          T1_DATE="$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%S')"
          T2_DATE="$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%S')"
          git add .
          GIT_AUTHOR_DATE="$T1_DATE" GIT_COMMITTER_DATE="$T1_DATE" git commit -m "T1: adr"
          printf 'update\n' >> .vault/adr/2026-06-13-conformance-adr.md
          git add .
          GIT_AUTHOR_DATE="$T2_DATE" GIT_COMMITTER_DATE="$T2_DATE" git commit -m "T2: update"

          # Start serve on an OS-assigned port; service.json carries the real
          # port + token (same pattern as conformance.rs start_serve).
          "$GITHUB_WORKSPACE/engine/target/debug/vaultspec" serve --port 0 &
          SERVE_PID=$!
          echo "SERVE_PID=$SERVE_PID" >> "$GITHUB_ENV"

          SERVICE_JSON="$FIXTURE/.vault/data/engine-data/service.json"
          for i in $(seq 30); do
            if [ -f "$SERVICE_JSON" ]; then
              PORT=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d['port'])" "$SERVICE_JSON")
              TOKEN=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d['service_token'])" "$SERVICE_JSON")
              if [ "$PORT" != "0" ] && [ -n "$TOKEN" ]; then break; fi
            fi
            sleep 1
          done

          echo "ENGINE_BASE_URL=http://127.0.0.1:$PORT" >> "$GITHUB_ENV"
          echo "ENGINE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run TS conformance test
        run: npx vitest run src/testing/engineConformance.test.ts --reporter=verbose
        working-directory: frontend
        env:
          ENGINE_BASE_URL: ${{ env.ENGINE_BASE_URL }}
          ENGINE_TOKEN: ${{ env.ENGINE_TOKEN }}
      - name: Stop serve
        if: always()
        run: kill "$SERVE_PID" 2>/dev/null || true

  scoop-bucket-guard:
    name: Scoop bucket version guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject version decrease in bucket/vaultspec.json
        shell: bash
        run: |
          set -euo pipefail
          BASE_VERSION=$(git show "origin/${{ github.base_ref }}:bucket/vaultspec.json" | jq -r '.version')
          HEAD_VERSION=$(jq -r '.version' bucket/vaultspec.json)
          if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            echo "bucket version unchanged (${HEAD_VERSION}) — OK"
            exit 0
          fi
          HIGHER=$(printf '%s\n' "$BASE_VERSION" "$HEAD_VERSION" | sort -V | tail -1)
          if [ "$HIGHER" != "$HEAD_VERSION" ]; then
            echo "ERROR: bucket/vaultspec.json would decrease from ${BASE_VERSION} to ${HEAD_VERSION}" >&2
            echo "Update the bucket to a version >= ${BASE_VERSION} before merging." >&2
            exit 1
          fi
          echo "bucket version ${BASE_VERSION} -> ${HEAD_VERSION} — forward, OK"

  supply-chain:
    name: Supply chain (cargo-deny · uv audit · npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: engine/Cargo.toml
          command: check
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked --group dev
      - name: uv audit (runtime surface; dev-only torch excluded per wheel-purity)
        run: uv audit --no-dev --preview-features audit
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - name: npm audit
        run: npm --prefix frontend audit

  release-inputs-gate:
    # The release-inputs gate (a2a-product-provisioning W04.P08.S72): validate the
    # component lock, the release-set-manifest schema, and the product builder +
    # its manifest verifiers BEFORE any release job may run. The vaultspec-product
    # suite composes + self-verifies real product trees against the committed lock
    # and exercises the lock/capsule/release-manifest verifiers, so a drift between
    # the pins, the schema, and the builder fails here rather than at release.
    name: Release inputs (lock · schema · product builder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read pinned toolchain
        id: toolchain
        shell: bash
        run: echo "channel=$(grep -m1 '^channel' engine/rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Component lock + release-set-manifest schema are well-formed
        shell: bash
        run: |
          set -euo pipefail
          python3 -c "import json; json.load(open('packaging/a2a-component.lock.json'))"
          python3 -c "import json; json.load(open('schemas/release-set-manifest.json'))"
      - name: Product builder, manifest verifiers, and lock/capsule/release pins
        run: cargo test -p vaultspec-product
        working-directory: engine
