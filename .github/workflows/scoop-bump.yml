# Post-announce scoop-manifest bump (distribution-channels ADR): dist calls
# this AFTER the GitHub Release publishes (`post-announce-jobs` in
# dist-workspace.toml). `scoop update` reads the COMMITTED manifest — scoop's
# checkver/autoupdate stanzas only serve maintainer tooling — so each release
# must land one bump commit. The released tag is read from the dist plan
# (passed as the `plan` workflow_call input); the hash comes from the
# published per-asset .sha256. The commit type is changelog-hidden (`chore`)
# so release-please treats it as noise.
#
# Recovery note: if a post-release PR merge clobbers the bump commit (a
# long-lived branch whose bucket/vaultspec.json predates the bump is merged
# without rebasing), the bucket silently regresses. Recover by triggering this
# workflow via workflow_dispatch with the plan JSON from the release run's
# "plan" artifact (copy the `manifest` output field).

name: scoop-bump

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      plan:
        description: 'dist manifest JSON from the release run (plan artifact manifest field)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Bump bucket/vaultspec.json to the released version
        shell: bash
        env:
          PLAN: ${{ inputs.plan }}
        run: |
          set -euo pipefail
          TAG=$(printf '%s' "$PLAN" | jq -r '.announcement_tag')
          VERSION="${TAG#v}"
          # W04.P10.S81: bump to the COMPLETE product archive (the whole offline
          # tree), never the binary-only vaultspec-cli archive.
          ASSET="vaultspec-${VERSION}-x86_64-pc-windows-msvc.zip"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ASSET}"
          HASH=$(curl --proto '=https' --tlsv1.2 -sSfL "${URL}.sha256" | cut -d' ' -f1)
          test -n "$VERSION" && test -n "$HASH"
          # Verify the published digest: download the archive and confirm its own
          # SHA-256 matches the sibling .sha256, so a corrupt or mismatched asset
          # never lands in the manifest.
          curl --proto '=https' --tlsv1.2 -sSfL "$URL" -o /tmp/complete.zip
          ACTUAL=$(sha256sum /tmp/complete.zip | cut -d' ' -f1)
          if [ "$ACTUAL" != "$HASH" ]; then
            echo "complete archive digest mismatch: sidecar ${HASH}, actual ${ACTUAL}"
            exit 1
          fi
          # Reversible downgrade: the url is version-parameterised and every bump is
          # its own commit, so `scoop install vaultspec@<older>` re-fetches that
          # version's complete archive from the retained release + git history — a
          # downgrade is always to a real, previously-published complete tree.
          # Guard: refuse to bump the manifest to a version older than what is
          # already committed. This catches the case where a stale branch merge
          # clobbered a prior bump and this job is re-run for an older release.
          CURRENT_VERSION=$(jq -r '.version' bucket/vaultspec.json)
          if [ "$(printf '%s\n' "$CURRENT_VERSION" "$VERSION" | sort -V | tail -1)" = "$CURRENT_VERSION" ] && \
             [ "$CURRENT_VERSION" != "$VERSION" ]; then
            echo "bucket is at ${CURRENT_VERSION}, refusing to bump backward to ${VERSION}"
            exit 1
          fi
          jq --arg v "$VERSION" --arg u "$URL" --arg h "$HASH" \
            '.version = $v | .url = $u | .hash = $h' \
            bucket/vaultspec.json > bucket/vaultspec.json.tmp
          mv bucket/vaultspec.json.tmp bucket/vaultspec.json
          if git diff --quiet -- bucket/vaultspec.json; then
            echo "manifest already at ${VERSION}; nothing to bump"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/vaultspec.json
          git commit -m "chore(scoop): bump manifest to ${TAG}"
          git push origin main
