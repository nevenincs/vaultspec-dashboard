# Engine workspace CI (plan W03.P12.S56): build, lint, test on every push
# and pull request touching the engine or its toolchain.

name: engine-ci

on:
  push:
    branches: [main]
    paths:
      - "engine/**"
      - ".github/workflows/engine-ci.yml"
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/engine-ci.yml"

jobs:
  engine:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [Linux, Windows]
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      # Pin CI to the repo toolchain (engine/rust-toolchain.toml) instead of
      # floating stable: the action exports RUSTUP_TOOLCHAIN, which overrides
      # the file, so the pin must be read and passed explicitly
      # (dashboard-packaging P03 reproducibility fix).
      # Read the pinned channel per-OS. The self-hosted Windows Git-Bash mangles
      # the runner's temp script path (drops separators → "No such file or
      # directory"), so the Windows leg reads the toml through pwsh instead of
      # bash; the Linux leg keeps the grep/cut form.
      - name: Read pinned toolchain (unix)
        id: toolchain-nix
        if: runner.os != 'Windows'
        shell: bash
        run: echo "channel=$(grep -m1 '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - name: Read pinned toolchain (windows)
        id: toolchain-win
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $line = Get-Content rust-toolchain.toml | Where-Object { $_ -match '^channel' } | Select-Object -First 1
          $channel = ($line -split '"')[1]
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain-nix.outputs.channel || steps.toolchain-win.outputs.channel }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      # The e2e + declared-tier integration tests spawn `vaultspec-core` from
      # PATH (the engine shells out to it for the declared tier); install it so
      # those tests run for real instead of failing with "program not found".
      - uses: astral-sh/setup-uv@v6
      - name: Install vaultspec-core (e2e + declared-tier dependency)
        shell: bash
        run: |
          uv tool install vaultspec-core
          echo "$(uv tool dir --bin)" >> "$GITHUB_PATH"
      - name: Test (unit + integration + e2e + bench)
        run: cargo test --workspace
      - name: Reclaim runner disk (always · unix)
        if: always() && runner.os != 'Windows'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set +e
          df -h . 2>/dev/null | tail -1
          pkill -f 'vaultspec .*serve' 2>/dev/null || true
          pkill -f 'target/debug/vaultspec' 2>/dev/null || true
          rm -rf "${TMPDIR:-/tmp}"/vaultspec-livetest-* "${RUNNER_TEMP:-/tmp}"/vaultspec-* 2>/dev/null || true
          if [ "${{ job.status }}" = "failure" ]; then
            rm -rf engine/target frontend/node_modules 2>/dev/null || true
          fi
          df -h . 2>/dev/null | tail -1
      - name: Reclaim runner disk (always · windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          Get-PSDrive -PSProvider FileSystem | Where-Object { $_.Used } | Format-Table -AutoSize
          Get-Process vaultspec -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $env:TEMP\vaultspec-* -ErrorAction SilentlyContinue
          if ('${{ job.status }}' -eq 'failure') {
            Remove-Item -Recurse -Force engine\target, frontend\node_modules -ErrorAction SilentlyContinue
          }
          Get-PSDrive -PSProvider FileSystem | Where-Object { $_.Used } | Format-Table -AutoSize
