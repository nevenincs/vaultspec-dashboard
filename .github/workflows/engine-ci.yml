# Engine workspace CI (plan W03.P12.S56): build, lint, test on every push
# and pull request touching the engine or its toolchain.

name: engine-ci

on:
  push:
    branches: [main]
    paths:
      - "engine/**"
      - ".github/workflows/engine-ci.yml"
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/engine-ci.yml"

jobs:
  engine:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      # Pin CI to the repo toolchain (engine/rust-toolchain.toml) instead of
      # floating stable: the action exports RUSTUP_TOOLCHAIN, which overrides
      # the file, so the pin must be read and passed explicitly
      # (dashboard-packaging P03 reproducibility fix).
      - name: Read pinned toolchain
        id: toolchain
        shell: bash
        run: echo "channel=$(grep -m1 '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      # The e2e + declared-tier integration tests spawn `vaultspec-core` from
      # PATH (the engine shells out to it for the declared tier); install it so
      # those tests run for real instead of failing with "program not found".
      - uses: astral-sh/setup-uv@v6
      - name: Install vaultspec-core (e2e + declared-tier dependency)
        shell: bash
        run: |
          uv tool install vaultspec-core
          echo "$(uv tool dir --bin)" >> "$GITHUB_PATH"
      - name: Test (unit + integration + e2e + bench)
        run: cargo test --workspace
