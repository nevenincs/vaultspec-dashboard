<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%23211e1a'/%3E%3Cg%20stroke='%235fb585'%20stroke-width='2'%20stroke-linecap='round'%3E%3Cline%20x1='10'%20y1='11'%20x2='22'%20y2='9'/%3E%3Cline%20x1='10'%20y1='11'%20x2='14'%20y2='23'/%3E%3C/g%3E%3Cg%20fill='%235fb585'%3E%3Ccircle%20cx='10'%20cy='11'%20r='3.5'/%3E%3Ccircle%20cx='22'%20cy='9'%20r='2.5'/%3E%3Ccircle%20cx='14'%20cy='23'%20r='2.5'/%3E%3C/g%3E%3C/svg%3E"
    />
    <title>vaultspec dashboard</title>
    <style>
      /* Boot shell (on-demand-cold-start): the instant pre-hydration skeleton,
         painted from this inline block BEFORE any bundle downloads or parses.
         Values mirror the paper/ink/accent design tokens (the token stylesheet
         is not loaded yet, so literal values are required here — the same
         sanctioned pattern as scene-read tokens); both themes covered via
         prefers-color-scheme. Removed by main.tsx once React commits. */
      #boot-shell {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
        background: #faf7f2;
        color: #57534e;
        font: 0.8125rem/1.4 ui-sans-serif, system-ui, sans-serif;
      }
      #boot-shell .boot-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 0.125rem;
        background: #5fb585;
        animation: boot-pulse 1.1s ease-in-out infinite alternate;
      }
      #boot-shell .boot-row {
        height: 0.625rem;
        border-radius: 0.25rem;
        background: #e7e0d6;
        animation: boot-pulse 1.1s ease-in-out infinite alternate;
      }
      #boot-shell .boot-head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #78716c;
      }
      @keyframes boot-pulse {
        from {
          opacity: 1;
        }
        to {
          opacity: 0.45;
        }
      }
      @media (prefers-color-scheme: dark) {
        #boot-shell {
          background: #211e1a;
          color: #a8a29e;
        }
        #boot-shell .boot-row {
          background: #37332d;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-shell .boot-bar,
        #boot-shell .boot-row {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-shell" role="status" aria-label="Loading vaultspec dashboard">
      <div class="boot-bar"></div>
      <div class="boot-head">
        <svg width="18" height="18" viewBox="0 0 32 32" aria-hidden="true">
          <rect width="32" height="32" rx="7" fill="#211e1a" />
          <g stroke="#5fb585" stroke-width="2" stroke-linecap="round">
            <line x1="10" y1="11" x2="22" y2="9" />
            <line x1="10" y1="11" x2="14" y2="23" />
          </g>
          <g fill="#5fb585">
            <circle cx="10" cy="11" r="3.5" />
            <circle cx="22" cy="9" r="2.5" />
            <circle cx="14" cy="23" r="2.5" />
          </g>
        </svg>
        <span>vaultspec — loading…</span>
      </div>
      <div class="boot-row" style="width: 60%"></div>
      <div class="boot-row" style="width: 42%"></div>
      <div class="boot-row" style="width: 74%"></div>
      <div class="boot-row" style="width: 51%; margin-top: 1rem"></div>
      <div class="boot-row" style="width: 66%"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
