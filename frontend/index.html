<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%23211e1a'/%3E%3Cg%20stroke='%235fb585'%20stroke-width='2'%20stroke-linecap='round'%3E%3Cline%20x1='10'%20y1='11'%20x2='22'%20y2='9'/%3E%3Cline%20x1='10'%20y1='11'%20x2='14'%20y2='23'/%3E%3C/g%3E%3Cg%20fill='%235fb585'%3E%3Ccircle%20cx='10'%20cy='11'%20r='3.5'/%3E%3Ccircle%20cx='22'%20cy='9'%20r='2.5'/%3E%3Ccircle%20cx='14'%20cy='23'%20r='2.5'/%3E%3C/g%3E%3C/svg%3E"
    />
    <title>vaultspec dashboard</title>
    <style>
      /* Boot shell (on-demand-cold-start): the instant pre-hydration loading
         state — one page-centered spinner, no text, no placeholder chrome —
         painted from this inline block BEFORE any bundle downloads or parses.
         Values mirror the paper/accent design tokens (the token stylesheet is
         not loaded yet, so literal values are required here — the same
         sanctioned pattern as scene-read tokens); both themes covered via
         prefers-color-scheme. Removed by main.tsx once React commits. */
      #boot-shell {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f2;
      }
      #boot-shell .boot-spinner {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        border: 0.1875rem solid #e7e0d6;
        border-top-color: #5fb585;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-color-scheme: dark) {
        #boot-shell {
          background: #211e1a;
        }
        #boot-shell .boot-spinner {
          border-color: #37332d;
          border-top-color: #5fb585;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-shell .boot-spinner {
          animation-duration: 2.4s;
        }
      }
    </style>
  </head>
  <body>
    <!-- Locale-neutral pre-hydration chrome: a purely visual spinner with no
         announced or on-screen text, so the static shell never flashes a
         source-language string before React commits the localized loading
         state. -->
    <div id="boot-shell">
      <div class="boot-spinner" aria-hidden="true"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
