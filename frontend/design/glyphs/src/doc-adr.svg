  <!-- left diverging arm to (5.6,6.0) -->
  <path d="M12 13.0 Q9.0 9.8 6.0 6.4" />
  <path d="M6.0 6.4 L6.0 9.4 M6.0 6.4 L9.0 6.4" />
  <!-- right diverging arm to (18.4,6.0), symmetric about x=12 -->
  <path d="M12 13.0 Q15.0 9.8 18.0 6.4" />
  <path d="M18.0 6.4 L18.0 9.4 M18.0 6.4 L15.0 6.4" />
</svg>
