<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- node-feature: a loose hand-circled cluster of unequal points (constellation knot, never face) -->
  <!-- binding lasso: center (12,12) r~8.4, drawn clockwise from just right of 12 o'clock,
       left OPEN with a ~70deg gap at the upper-left so it reads as a sketched loop, not a closed head -->
  <path d="M12.8 3.8 Q18.2 4.6 20.0 9.4 Q21.6 14.6 17.6 18.0 Q13.4 21.4 8.4 19.6 Q3.8 17.8 3.5 12.8 Q3.3 10.4 4.6 8.4" />
  <!-- three constellation points, three sizes, scalene triangle: largest low-left -->
  <circle cx="8.4" cy="13.8" r="2.0" fill="currentColor" stroke="none" />
  <circle cx="16.0" cy="8.6" r="1.4" fill="currentColor" stroke="none" />
  <circle cx="13.0" cy="15.0" r="1.0" fill="currentColor" stroke="none" />
  <!-- one constellation thread, detail weight, between the two smaller dots —
       steeply diagonal with clear air around each dot, so it never fuses into a bar -->
  <path d="M15.2 10.3 Q14.6 11.9 13.7 13.5" stroke-width="1.25" />
</svg>
