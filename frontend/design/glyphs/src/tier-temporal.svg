<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- tier-temporal: dotted/dashed ring with a center dot (clock feel, no hands) -->
  <!-- dashed ring, exact center (12,12) r=7.0 — dash pattern is the treatment signal -->
  <circle cx="12" cy="12" r="7.0" stroke-dasharray="0.2 4.05" stroke-width="2.4" />
  <!-- center dot -->
  <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none" />
</svg>
