<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- event-commit: a filled dot on a vertical branch line with a short branch tick -->
  <!-- main branch line, exact x=10, overshot top/bottom ~0.4u -->
  <path d="M10 3.6 Q9.8 12 10 20.4" />
  <!-- commit node, exact center (10,12) -->
  <circle cx="10" cy="12" r="2.6" fill="currentColor" stroke="none" />
  <!-- short branch tick diverging up-right -->
  <path d="M11.9 10.1 Q14.6 7.4 18.0 6.4" />
  <circle cx="18.4" cy="6.2" r="1.4" />
</svg>
