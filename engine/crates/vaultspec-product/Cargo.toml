[package]
name = "vaultspec-product"
description = "Shared product-contract boundary for dashboard-owned A2A lifecycle, release-set, and update consumers."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
fs4 = { version = "0.13", default-features = false, features = ["sync"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = { version = "0.10.9", default-features = false }
sysinfo = { version = "0.39.6", default-features = false, features = ["system"] }

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", default-features = false, features = ["signal"] }

[target.'cfg(windows)'.dependencies]
command-group = { version = "5.0.1", default-features = false }

[lints]
workspace = true
