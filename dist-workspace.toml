[workspace]
members = ["cargo:engine"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# No Cargo Dist installers (a2a-product-provisioning W04.P09.S73): Dist's
# generated shell/PowerShell/MSI installers are BINARY-ONLY — they place the
# `vaultspec` binary but not the complete offline product tree (dashboard +
# updater + pinned A2A capsule + manifests + licenses + SBOM + receipt). The
# product-owned installers replace them: `packaging/install.sh`,
# `packaging/install.ps1`, and the complete MSI built from `engine/crates/
# vaultspec-cli/wix/main.wxs`. Dist is retained ONLY for target planning,
# checksums, and GitHub release hosting.
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# No Dist updater (a2a-product-provisioning W04.P09.S73 + W03.P07): Dist's
# axoupdater is retired in favour of the product-owned copied external updater
# (`vaultspec-updater`), which replaces the release outside the active seat under
# the installation lock. The product installers place it; Dist must not.
install-updater = false
# Features to pass to cargo build
features = ["embed-spa"]
# Steps injected into every build job BEFORE cargo runs: the embed-spa build
# compiles frontend/dist into the binary, so the SPA bundle must exist first
# (build order, dashboard-packaging D2).
github-build-setup = "../release-build-setup.yml"
# Which actions to run on pull requests
pr-run-mode = "plan"
# Whether dist should create a Github Release or use an existing draft
create-release = false
# Post-announce jobs to run in CI
post-announce-jobs = ["./scoop-bump"]

# Artifact builds run on the shared self-hosted fleet (hosted multiplatform
# runners are cost-prohibitive). Labels are the auto-assigned OS labels of the
# registered machines: Windows = gw-workstation-win, Linux = gw-workstation-wsl,
# macOS = macbook-neo. aarch64-linux cross-compiles on the WSL runner.
[dist.github-custom-runners]
aarch64-apple-darwin = "macOS"
x86_64-apple-darwin = "macOS"
aarch64-unknown-linux-gnu = "Linux"
x86_64-unknown-linux-gnu = "Linux"
x86_64-pc-windows-msvc = "Windows"
